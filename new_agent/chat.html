<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ofstride Intake Agent</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    .container { max-width: 900px; margin: 0 auto; padding: 24px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; }
    .messages { height: 60vh; overflow-y: auto; padding: 12px; background: #0b1220; border-radius: 10px; }
    .msg { margin: 8px 0; padding: 10px 12px; border-radius: 8px; }
    .user { background: #1d4ed8; color: #fff; align-self: flex-end; }
    .bot { background: #1f2937; color: #e5e7eb; }
    .row { display: flex; gap: 12px; }
    .input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; }
    .btn { padding: 10px 16px; border-radius: 8px; border: 0; background: #22c55e; color: #0f172a; font-weight: 600; cursor: pointer; }
    .debug { margin-top: 12px; font-size: 12px; color: #94a3b8; white-space: pre-wrap; }
    .upload { margin-top: 12px; display: flex; gap: 12px; align-items: center; }
    .file { color: #cbd5f5; }
    .chips { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { padding: 8px 12px; border-radius: 999px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ofstride Intake Agent</h1>
    <div class="card">
      <div id="messages" class="messages"></div>
      <div class="row" style="margin-top: 12px;">
        <input id="input" class="input" placeholder="Type your message..." />
        <button id="send" class="btn">Send</button>
      </div>
      <div class="upload">
        <input id="file" class="file" type="file" accept=".txt,.md,.csv,.log,.pdf" />
        <button id="upload" class="btn" style="background:#38bdf8;">Upload Document</button>
      </div>
      <div class="chips" id="chips">
        <button class="chip" data-service="IT Services" data-link="#">IT Services</button>
        <button class="chip" data-service="Finance Services" data-link="#">Finance Services</button>
        <button class="chip" data-service="HR Services" data-link="#">HR Services</button>
        <button class="chip" data-service="Legal Services" data-link="#">Legal Services</button>
      </div>
      <div id="debug" class="debug"></div>
    </div>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const uploadBtn = document.getElementById('upload');
    const fileInput = document.getElementById('file');
    const chips = document.getElementById('chips');
    const debugBox = document.getElementById('debug');
    const sessionId = 'dev_ui';

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      input.value = '';

      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      const data = await res.json();
      if (data.text) addMessage(data.text, 'bot');
      if (data.debug) debugBox.textContent = JSON.stringify(data.debug, null, 2);
      if (data.session_summary) {
        debugBox.textContent += "\n\nSession Summary:\n" + data.session_summary;
      }
      if (data.handoff) {
        debugBox.textContent += "\n\nHandoff:\n" + JSON.stringify(data.handoff, null, 2);
      }
      if (data.matching_weights) {
        debugBox.textContent += "\n\nMatching Weights:\n" + JSON.stringify(data.matching_weights, null, 2);
      }
      if (data.telemetry) {
        debugBox.textContent += "\n\nTelemetry:\n" + JSON.stringify(data.telemetry, null, 2);
      }
    }

    async function uploadDocument() {
      const file = fileInput.files[0];
      if (!file) return;
      addMessage(`Uploaded document: ${file.name}`, 'user');
      const form = new FormData();
      form.append('file', file);
      form.append('session_id', sessionId);
      const res = await fetch('/upload', { method: 'POST', body: form });
      const data = await res.json();
      if (data.text) addMessage(data.text, 'bot');
      if (data.debug) debugBox.textContent = JSON.stringify(data.debug, null, 2);
      if (data.document_summary) {
        debugBox.textContent += "\n\nDocument Summary:\n" + data.document_summary;
      }
      if (data.document_entities) {
        debugBox.textContent += "\n\nDocument Entities:\n" + JSON.stringify(data.document_entities, null, 2);
      }
    }

    chips.addEventListener('click', (e) => {
      const target = e.target;
      if (!target || !target.dataset || !target.dataset.service) return;
      const service = target.dataset.service;
      const link = target.dataset.link;
      if (link && link !== '#') window.open(link, '_blank');
      input.value = `I'm interested in ${service}.`;
      sendMessage();
    });

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    uploadBtn.addEventListener('click', uploadDocument);
  </script>
</body>
</html>
